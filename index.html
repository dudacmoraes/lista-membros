<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Lista de Membros</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="top-bar"></div>

        <nav>
            <div class="brand-group">
                <span class="brand-text">Grupo Empresarial</span>
            </div>
            <div class="nav-right">LISTA DE MEMBROS</div>
        </nav>

        <section class="hero">
            <h1>Lista de Membros</h1>
            <p>Aplicação demonstrativa com dados fictícios</p>
        </section>

        <main class="container">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Filtrar por nome, empresa ou categoria..."/>
                <span id="contador"></span>
            </div>

            <div class="table-wrapper">
                <table id="tabelaMembros">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Empresa</th>
                            <th>Categoria</th>
                            <th>Telefone</th>
                            <th style="text-align:center">E-mail</th>
                        </tr>
                    </thead>
                    <tbody id="memberData"></tbody>
                </table>
            </div>

            <p class="lgpd-note">*Todos os dados exibidos nesta aplicação são fictícios e utilizados apenas para fins educacionais e demonstração técnica.</p>
        </main>

        <script src="script.js"></script>

    </body>
</html>
